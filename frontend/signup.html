<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Join our secure Todo list application and start managing your tasks today." />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  <title>Signup | Todo</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@2.18.0/dist/full.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2/dist/tailwind.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
</head>

<body class="flex justify-center items-center min-h-screen p-4">
  <div class="glass-card w-full max-w-md p-8 animate-fade-in">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-extrabold gradient-text mb-2">Create Account</h1>
      <p class="text-muted text-sm font-medium">Join us and start organizing your life</p>
    </div>

    <div class="flex flex-col gap-3">
      <div class="grid grid-cols-1 gap-3">
        <div class="form-control">
          <input id="name" type="text" placeholder="Full Name"
            class="input input-bordered input-premium w-full bg-opacity-20" />
        </div>
        <div class="form-control">
          <input id="username" type="text" placeholder="Username"
            class="input input-bordered input-premium w-full bg-opacity-20" />
        </div>
        <div class="form-control">
          <input id="email" type="email" placeholder="Email Address"
            class="input input-bordered input-premium w-full bg-opacity-20" />
        </div>
        <div class="form-control">
          <input id="password" type="password" placeholder="Password"
            class="input input-bordered input-premium w-full bg-opacity-20" />
        </div>
        <div class="form-control">
          <input id="confirmPassword" type="password" placeholder="Confirm Password"
            class="input input-bordered input-premium w-full bg-opacity-20" />
        </div>
      </div>

      <p id="signup-error" class="text-red-500 text-xs font-medium text-center h-4"></p>

      <button onclick="signup()" class="btn btn-premium mt-4 text-lg py-3 rounded-xl h-auto">
        Sign Up
      </button>

      <div class="text-center mt-6">
        <p class="text-sm opacity-70 mb-2">Already have an account?</p>
        <a href="login.html" class="text-primary font-bold hover:underline transition-all">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>

</html>
